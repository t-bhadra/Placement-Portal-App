<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Placement Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <span class="navbar-brand">Placement Portal</span>

        {% if session.admin %}
        <a href="/admin/dashboard" class="btn btn-light">Admin Dashboard</a>
        {% elif session.company_id %}
        <a href="/company/dashboard" class="btn btn-light">Company Dashboard</a>
        {% elif session.student_id %}
        <a href="/student/dashboard" class="btn btn-light">Student Dashboard</a>
        {% endif %}
    </div>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
