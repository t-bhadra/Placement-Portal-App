<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal</title>

    <style>
        /* Make page full height */
        html, body {
            height: 100%;
            margin: 0;
        }

        /* Flexbox layout to push footer down */
        body {
            display: flex;
            flex-direction: column;

            background-image: url("https://tse1.mm.bing.net/th/id/OIP.yGmKKb37FJoNpRKbQD3ANgHaEO?pid=Api&P=0&h=180");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Dark overlay to dim image */
        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4); 
            z-index: -1;
        }

        /* NAVBAR */
        .nav-bar {
            background-color: #10c7b5;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 15px;
            padding: 6px 12px;
            border-radius: 6px;
            background-color: #0a9e8d;
        }

        /* MAIN CENTER TEXT */
        .center-text {
            text-align: center;
            margin-top: 150px;
            color: white;
            font-size: 35px;
            font-weight: bold;
            text-shadow: 1px 1px 4px black;
        }

        /* FOOTER – pushed to bottom by flexbox */
        .site-footer {
            background-color: rgba(0,0,0,0.8);
            color: white;
            padding: 10px;
            text-align: center;
            margin-top: auto; /* THIS pushes footer to bottom */
        }
        .site-footer p {
            margin:0;
        }
    </style>
</head>

<body>

    <nav class="nav-bar">
        <div class="logo">Placement Portal Application</div>

        <div class="nav-links">
            <a href="{{url_for('registration')}}">Register</a>
            <a href="{{url_for('login')}}">Login</a>
        </div>
    </nav>

    {% block content %}
    {% endblock %}

    <footer class="site-footer">
        <p>&copy; 2026 Placement Portal Application. All Rights Reserved.</p>
    </footer>

</body>
</html>
